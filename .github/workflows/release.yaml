name: Build and Release Electron App

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build for Linux inside Docker
        if: matrix.os == 'ubuntu-latest'
        run: |
          docker build -t electron-builder-image .github
          docker run --rm -v $(pwd):/app electron-builder-image bash -c "npm install && npm run build -- --linux"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix permissions for artifacts
        if: matrix.os == 'ubuntu-latest'
        run: sudo chown -R $USER:$USER dist

      - name: Upload AppImage to release
        if: matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}